backend:
  name: git-gateway
  branch: main

media_folder: "images/blog/uploads"
public_folder: "/images/blog/uploads"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "content/blog"
    create: true
    slug: "{{slug}}"
    fields:
      # ─── CORE (Required) ────────────────────────────────────────────────────
      - label: "Title"
        name: "title"
        widget: "string"
        hint: "⭐ REQUIRED — The main heading of your post. Also used as SEO title if you leave SEO Title blank below."

      - label: "Date"
        name: "date"
        widget: "datetime"
        hint: "⭐ REQUIRED — Publication date shown on the post and used for sorting."

      - label: "Excerpt"
        name: "excerpt"
        widget: "text"
        hint: "⭐ REQUIRED — Short summary shown on the blog index card. Also used as meta description if SEO Description is blank. Keep under 160 characters."

      - label: "Cover Image"
        name: "cover_image"
        widget: "image"
        hint: "⭐ REQUIRED — Main image shown at the top of the post and on the blog index card. Also used as OG image if OG Image is blank."

      - label: "Body"
        name: "body"
        widget: "markdown"
        hint: "⭐ REQUIRED — The full content of your post."

      # ─── SEO — HIGH IMPACT ──────────────────────────────────────────────────
      - label: "SEO Title [HIGH IMPACT]"
        name: "seo_title"
        widget: "string"
        required: false
        hint: "🔴 HIGH IMPACT — Overrides the post title in the browser tab and Google search results. Keep under 60 characters. If blank, falls back to Title. Tip: include your main keyword near the front e.g. 'CSS Flexbox Guide | Red Surge Technology'."

      - label: "SEO Description [HIGH IMPACT]"
        name: "seo_description"
        widget: "text"
        required: false
        hint: "🔴 HIGH IMPACT — The snippet shown under your link in Google. Keep under 160 characters. If blank, falls back to Excerpt. Write it like an ad — make people want to click."

      - label: "Author Name [HIGH IMPACT]"
        name: "author_name"
        widget: "string"
        default: "Red Surge Technology"
        required: false
        hint: "🔴 HIGH IMPACT — Google's E-E-A-T system rewards named, credible authors. Use a real person's name where possible e.g. 'John Smith'. Defaults to Red Surge Technology."

      - label: "Last Modified [HIGH IMPACT]"
        name: "last_modified"
        widget: "datetime"
        required: false
        hint: "🔴 HIGH IMPACT — Update this every time you edit a post. Google favors fresh, maintained content. Leave blank on first publish — only fill in when editing an existing post."

      - label: "Tags [HIGH IMPACT]"
        name: "tags"
        widget: "list"
        required: false
        hint: "🔴 HIGH IMPACT — Keywords that describe this post. Used in JSON-LD schema to help Google understand the topic. Add 3–6 specific tags e.g. css, responsive design, flexbox, mobile layout."

      # ─── SEO — MEDIUM IMPACT ───────────────────────────────────────────────
      - label: "Category [MEDIUM IMPACT]"
        name: "category"
        widget: "select"
        required: false
        options:
          - "Web Design"
          - "Web Development"
          - "SEO"
          - "CSS"
          - "JavaScript"
          - "Laravel"
          - "Tutorial"
          - "Case Study"
        hint: "🟡 MEDIUM IMPACT — Groups posts by topic. Shown on the post page and helps Google understand your site structure. Pick the closest match."

      - label: "Reading Time (mins) [MEDIUM IMPACT]"
        name: "reading_time"
        widget: "number"
        required: false
        hint: "🟡 MEDIUM IMPACT — Shown on the post page. Improves user engagement and dwell time which indirectly helps rankings. Rough guide: 200 words per minute. A 1000 word post = 5 mins."

      - label: "OG Image [MEDIUM IMPACT]"
        name: "og_image"
        widget: "image"
        required: false
        hint: "🟡 MEDIUM IMPACT — Image shown when the post is shared on LinkedIn, Twitter, Facebook etc. Ideally 1200x630px. If blank, falls back to Cover Image. Worth setting if you plan to share the post on social media."

      # ─── SEO — LOW IMPACT / SITUATIONAL ────────────────────────────────────
      - label: "Featured Post [LOW IMPACT]"
        name: "featured"
        widget: "boolean"
        default: false
        required: false
        hint: "🟢 LOW IMPACT — Pin this post to the top of the blog index above all others. Use sparingly — only for your best or most important posts."

      - label: "Canonical URL [SITUATIONAL]"
        name: "canonical"
        widget: "string"
        required: false
        hint: "⚪ SITUATIONAL — Only fill this in if this post was originally published somewhere else (e.g. Dev.to, Medium). Tells Google where the original lives to avoid duplicate content penalties. Leave blank for all normal posts."

      - label: "No Index [SITUATIONAL]"
        name: "no_index"
        widget: "boolean"
        default: false
        required: false
        hint: "⚪ SITUATIONAL — Turn ON to hide this post from Google entirely. Only use for draft previews or posts you don't want indexed. Leave OFF for all normal posts."